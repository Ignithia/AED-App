<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Informatiescherm AED</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
      }

      h2 {
        color: #dfd0bb;
      }

      p {
        color: #b3a38c;
      }

      .frame {
        aspect-ratio: 9 / 16;
        height: 100vh;
        max-width: 100vw;
        background: #251d1d;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-radius: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      .content {
        flex: 0 0 72%;
        min-height: 0;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #251d1d;
        overflow: hidden;
        position: relative;
      }

      .media-slot {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem 0.6rem 0.2rem 0.6rem;
        background: #251d1d;
      }

      .media-frame {
        width: 100%;
        height: 100%;
        background: #f5efe4;
        border-radius: 1.25rem;
        padding: 0.35rem;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        position: relative;
        z-index: 0;
        -webkit-mask-image: -webkit-radial-gradient(white, black);
        mask-image: radial-gradient(white, black);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      .media-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        border-radius: calc(1.25rem - 0.35rem);
        background: transparent;
      }

      .media-frame video {
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        margin: -2px;
        object-fit: cover;
        object-position: center;
        display: block;
        border-radius: 0;
        background: transparent;
        transform: translateZ(0) scale(1.02);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      .qr-overlay {
        position: absolute;
        right: 1rem;
        bottom: 1.75rem;
        width: 96px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 0.75rem;
        padding: 0.5rem;
        text-align: center;
        z-index: 20;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
      }

      .qr-overlay img {
        width: 100%;
        height: auto;
        display: block;
        background: #fff;
      }

      .events {
        flex: 0 0 28%;
        min-height: 0;
        width: 100%;
        background: #251d1d;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        padding: 0.5rem 1rem 1rem 1rem;
        overflow: hidden;
        gap: 0.75rem;
      }

      .events-inner {
        flex: 1;
        min-height: 0;
        background: #352c2c;
        border-radius: 1.1rem;
        padding: 0.9rem;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .events-title {
        font-size: 1.4rem;
        margin: 0 0 0.75rem 0;
      }

      .events-row {
        display: flex;
        gap: 1rem;
        flex: 1;
        min-height: 0;
      }

      .events-top,
      .agenciesNow {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .section-title {
        font-size: 1rem;
        margin: 0 0 0.5rem;
      }

      .scroll-box {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        position: relative;
      }

      .scroll-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .event,
      .agency {
        background: #463939;
        padding: 0.6rem;
        border-radius: 0.5rem;
      }

      .event h2 {
        font-size: 1rem;
        margin: 0 0 0.25rem;
      }

      .event p,
      .agency p {
        font-size: 0.9rem;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="content">
        <div class="media-slot"></div>

        <div class="qr-overlay">
          <img src="./assets/images/qr.png" alt="Scan de QR-code voor de app" />
        </div>
      </div>

      <div class="events">
        <div class="events-inner">
          <div class="events-row">
            <div class="events-top">
              <h2 class="section-title">Events</h2>

              <div class="scroll-box" id="eventsScroll">
                <div class="scroll-list" id="eventsList">
                  <div class="event">
                    <h2>Event 1</h2>
                    <p>Description of the event.</p>
                  </div>
                  <div class="event">
                    <h2>Event 2</h2>
                    <p>Another short description.</p>
                  </div>
                  <div class="event">
                    <h2>Event 3</h2>
                    <p>Another short description.</p>
                  </div>
                  <div class="event">
                    <h2>Event 4</h2>
                    <p>Another short description.</p>
                  </div>
                </div>
              </div>
            </div>

            <div class="agenciesNow">
              <h2 class="section-title">Agencies in today</h2>

              <div class="scroll-box" id="agenciesScroll">
                <div class="scroll-list" id="agenciesList">
                  <div class="agency"><p>Agency 1</p></div>
                  <div class="agency"><p>Agency 2</p></div>
                  <div class="agency"><p>Agency 3</p></div>
                  <div class="agency"><p>Agency 4</p></div>
                  <div class="agency"><p>Agency 5</p></div>
                  <div class="agency"><p>Agency 6</p></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const playlist = [
        { type: "image", src: "./assets/images/map.svg", duration: 6000 },
        { type: "video", src: "./assets/videos/AED_video_1.mp4" },
      ];

      const mediaSlot = document.querySelector(".media-slot");
      let currentIndex = 0;
      let timer = null;

      function nextSlide() {
        currentIndex = (currentIndex + 1) % playlist.length;
        showSlide();
      }

      function showSlide() {
        clearTimeout(timer);
        mediaSlot.innerHTML = "";

        const item = playlist[currentIndex];
        const mediaFrame = document.createElement("div");
        mediaFrame.className = "media-frame";

        if (item.type === "image") {
          const img = document.createElement("img");
          img.src = item.src;
          img.alt = "AED map";
          img.onerror = () => console.error("Image failed:", item.src);

          mediaFrame.appendChild(img);
          mediaSlot.appendChild(mediaFrame);

          timer = setTimeout(nextSlide, item.duration || 5000);
        }

        if (item.type === "video") {
          const video = document.createElement("video");
          video.src = item.src;
          video.autoplay = true;
          video.muted = true;
          video.playsInline = true;
          video.controls = false;
          video.onerror = () => console.error("Video failed:", item.src);
          video.onended = nextSlide;

          mediaFrame.appendChild(video);
          mediaSlot.appendChild(mediaFrame);

          video.play().catch((err) => {
            console.error("Video autoplay failed:", err);
            nextSlide();
          });
        }
      }

      showSlide();

      function startInfiniteScroll(boxId, listId, speed = 1, interval = 40) {
        const box = document.getElementById(boxId);
        const list = document.getElementById(listId);

        if (!box || !list) return;

        list.innerHTML += list.innerHTML;

        setInterval(() => {
          box.scrollTop += speed;

          if (box.scrollTop >= list.scrollHeight / 2) {
            box.scrollTop = 0;
          }
        }, interval);
      }

      startInfiniteScroll("eventsScroll", "eventsList", 1, 40);
      startInfiniteScroll("agenciesScroll", "agenciesList", 1, 50);
    </script>
  </body>
</html>
