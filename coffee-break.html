<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AED Studios - Coffee Break</title>

    <link rel="stylesheet" href="css/main.css">
    <script src="./components/bottomnavigation.js"></script>
</head>
<body>

    <div class="coffee-break-page">
        <h2 class="coffee-break-page-title">Coffee break</h2>
        <div class="coffee-break-page-line"></div>

        <section class="coffee-break-form-group">
            <div class="coffee-break-label-wrap">
                <label class="coffee-break-label">Locatie</label>
                <span class="coffee-break-helper">Beschikbare locaties</span>
            </div>
            <select class="coffee-break-select">
                <option>Studio 6</option>
                <option>Studio 12</option>
                <option>Studio 100</option>
            </select>
        </section>

        <section class="coffee-break-form-group coffee-break-reason-group">
            <label class="coffee-break-label">Reden</label>
            <textarea class="coffee-break-textarea" rows="7">Koffie pauze met de mannen.
Vrouwen ook welkom.</textarea>
        </section>

        <div class="coffee-break-actions">
            <button class="coffee-break-primary-action" type="button">Door gaan</button>
            <button class="coffee-break-secondary-action" type="button">Annuleer</button>
        </div>
    </div>

    <bottom-navigation></bottom-navigation>

</body>
</html>
