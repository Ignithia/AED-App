<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <title>AED Studios</title>

    <link rel="stylesheet" href="css/main.css">

    <script src="./components/bottomnavigation.js"></script>
</head>
<body>

    <h2>Bedrijven Lijst</h2>
    <div class="line"></div>
    
    <div class="filter-bar">
        <label for="tagInput" class="visually-hidden">Zoek op tag</label>
        <div class="tag-select">
            <input id="tagInput" autocomplete="off" placeholder="Zoek op tag (bijv. productie, TV)...">
            <ul id="tagDropdown" class="tag-dropdown" aria-hidden="true"></ul>
        </div>
        <button id="clearFilter" type="button">Wis</button>
    </div>

    <div class="company-list">
        <a href="company-detail.html">
            <div class="company-item" data-tags="productie,Internationaal">
                <img src="./images/logo/banijay-logo.png" class="company-list-img">
                <div class="divider-company-list"></div>
                <h2 class="company-name">Banijay Belgium</h2>
            </div>
        </a>

        <a href="company-detail.html">
            <div class="company-item" data-tags="productie,TV,Internationaal">
                <img src="./images/logo/warner-bross-logo.png" class="company-list-img">
                <div class="divider-company-list"></div>
                <h2 class="company-name">Warner Bros.</h2>
            </div>
        </a>
        
        <a href="company-detail.html">
            <div class="company-item" data-tags="TV,Productiehuis">
                <img src="./images/logo/studio100-logo.png" class="company-list-img">
                <div class="divider-company-list"></div>
                <h2 class="company-name">Studio 100</h2>
            </div>
        </a>

        <a href="company-detail.html">
            <div class="company-item" data-tags="productie,TV,Productiehuis">
                <img src="./images/logo/woestijnvis-logo.png" class="company-list-img">
                <div class="divider-company-list"></div>
                <h2 class="company-name">Woestijnvis</h2>
            </div>
        </a>

    </div>  


    <bottom-navigation></bottom-navigation>
</bottom-navigation>

    <script>
        (function(){
            const input = document.getElementById('tagInput');
            const clearBtn = document.getElementById('clearFilter');
            const items = document.querySelectorAll('.company-item');
            const dropdown = document.getElementById('tagDropdown');
            const tags = ['productie','TV','Productiehuis','Internationaal','Muziek'];

            function applyFilter(){
                const q = (input.value || '').trim().toLowerCase();
                if(!q){
                    items.forEach(i=> i.closest('a').style.display = '');
                    return;
                }
                items.forEach(i=>{
                    const itemTags = (i.dataset.tags || '').toLowerCase().split(',').map(s=>s.trim());
                    const match = itemTags.includes(q);
                    i.closest('a').style.display = match ? '' : 'none';
                });
            }

            function populateDropdown(filterText){
                dropdown.innerHTML = '';
                const f = (filterText || '').trim().toLowerCase();
                const matched = tags.filter(t => t.toLowerCase().includes(f));
                matched.forEach(t => {
                    const li = document.createElement('li');
                    li.textContent = t;
                    li.dataset.value = t;
                    li.tabIndex = 0;
                    li.addEventListener('click', ()=>{
                        input.value = t;
                        dropdown.style.display = 'none';
                        applyFilter();
                    });
                    dropdown.appendChild(li);
                });
                dropdown.style.display = matched.length ? 'block' : 'none';
            }

            input.addEventListener('input', function(){ populateDropdown(this.value); applyFilter(); });
            input.addEventListener('focus', function(){ populateDropdown(this.value); });
            clearBtn.addEventListener('click', function(){ input.value=''; applyFilter(); dropdown.style.display='none'; });

            document.addEventListener('click', function(e){
                if(!e.target.closest('.tag-select')) dropdown.style.display = 'none';
            });
        })();
    </script>

</body>
</html>
