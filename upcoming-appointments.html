<body>

    <div class="tabs-container">
        <div class="tabs">
            <a href="events.html" class="tab">Geplande<br>afspraken</a>

                    <div class="event-choice">

                            <span class="action-symbol">✓</span>
                        </button>
                        <span class="action-label">Accepteren</span>
                    </div>
                    <div class="event-choice">
                        <button class="action-icon action-reject" type="button">
