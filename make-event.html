<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AED Studios - Plan evenement</title>

    <link rel="stylesheet" href="css/main.css">
    <script src="./components/bottomnavigation.js"></script>
</head>
<body>

    <h2 class="make-event-title">Plan evenement</h2>

    <form class="make-event-form">
        <div class="make-event-field">
            <label for="event-name">Naam (verplicht)</label>
            <input id="event-name" type="text" placeholder="Naam">
        </div>

        <div class="make-event-field make-event-field-large">
            <label for="event-intro">Intro (verplicht)</label>
            <textarea id="event-intro" rows="6" placeholder="Intro"></textarea>
        </div>

        <div class="make-event-field">
            <label for="event-phone">Telefoonnummer (verplicht)</label>
            <input id="event-phone" type="text" placeholder="Telefoonnummer">
        </div>

        <div class="make-event-field">
            <label for="event-contact">Contactpersoon (verplicht)</label>
            <input id="event-contact" type="text" placeholder="contact persoon">
        </div>

        <div class="make-event-field">
            <label for="event-location">Locatie (verplicht)</label>
            <input id="event-location" type="text" placeholder="contact persoon">
        </div>

        <div class="make-event-field make-event-field-calendar">
            <label for="event-date">Vul datum in</label>
            <input id="event-date" type="text" placeholder="dd/mm/yyyy">
        </div>

        <div class="make-event-time-group">
            <label>Vul begin tijd in</label>
            <div class="make-event-time-row">
                <div class="make-event-time-box make-event-time-box-active">
                    <span class="make-event-time-value">20</span>
                    <span class="make-event-time-caption">Uur</span>
                </div>
                <span class="make-event-time-separator">:</span>
                <div class="make-event-time-box make-event-time-box-muted">
                    <span class="make-event-time-value">00</span>
                    <span class="make-event-time-caption">Minute</span>
                </div>
            </div>
        </div>

        <div class="make-event-time-group">
            <label>Vul eind tijd in</label>
            <div class="make-event-time-row">
                <div class="make-event-time-box make-event-time-box-active">
                    <span class="make-event-time-value">20</span>
                    <span class="make-event-time-caption">Uur</span>
                </div>
                <span class="make-event-time-separator">:</span>
                <div class="make-event-time-box make-event-time-box-muted">
                    <span class="make-event-time-value">00</span>
                    <span class="make-event-time-caption">Minute</span>
                </div>
            </div>
        </div>

        <div class="make-event-field make-event-field-large">
            <label for="event-tags">Tags (minstens 1)</label>
            <textarea id="event-tags" rows="3" placeholder="Tags"></textarea>
        </div>

        <div class="make-event-actions">
            <button class="make-event-save" type="submit">Opslaan</button>
            <button class="make-event-cancel" type="button">Annuleer</button>
        </div>
    </form>

   <bottom-navigation></bottom-navigation>

</body>
</html>
